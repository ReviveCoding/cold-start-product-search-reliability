version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns: ["numpy", "pandas", "scipy", "scikit-learn", "xgboost*"]
      serving-runtime:
        patterns: ["fastapi", "uvicorn", "pydantic", "httpx*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
