name: linux-policy-diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: diagnose-ubuntu-py${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/validated.txt

      - name: Print Python runtime
        shell: bash
        run: |
          python --version

      - name: Install package and integration dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -c constraints/validated.txt -e ".[dev]"
          python -m pip check

      - name: Print installed dependency identity
        shell: bash
        run: |
          python --version
          python -c "import numpy, pandas, sklearn, xgboost; print({'numpy': numpy.__version__, 'pandas': pandas.__version__, 'sklearn': sklearn.__version__, 'xgboost': xgboost.__version__})"

      - name: Generate Linux smoke artifacts
        shell: bash
        run: |
          set +e

          python scripts/run_full_pipeline.py \
            --config configs/smoke.yaml \
            > /tmp/pipeline.stdout.log \
            2> /tmp/pipeline.stderr.log

          pipeline_exit=$?

          echo "===== PIPELINE EXIT ====="
          echo "PIPELINE_EXIT=$pipeline_exit"

          echo "===== PIPELINE STDOUT ====="
          tail -n 500 /tmp/pipeline.stdout.log || true

          echo "===== PIPELINE STDERR ====="
          tail -n 500 /tmp/pipeline.stderr.log || true

          exit 0

      - name: Print Linux release evidence
        if: always()
        shell: bash
        run: |
          set +e

          echo "===== ARTIFACT INVENTORY ====="
          find artifacts/smoke -maxdepth 4 -type f -print | sort || true

          for path in \
            artifacts/smoke/release_decision.json \
            artifacts/smoke/dynamic_summary.json \
            artifacts/smoke/policy_sensitivity/policy_sensitivity.json \
            artifacts/smoke/metrics.json \
            artifacts/smoke/ope_metrics.json \
            artifacts/smoke/serving_benchmark.json \
            artifacts/smoke/manifest.json; do

            echo ""
            echo "===== $path ====="

            if [ -f "$path" ]; then
              cat "$path"
            else
              echo "MISSING"
            fi
          done

          exit 0

      - name: Validate generated artifacts without regeneration
        if: always()
        shell: bash
        run: |
          set +e

          python scripts/integration_validation.py \
            --config configs/smoke.yaml \
            --skip-pipeline \
            > /tmp/integration.stdout.log \
            2> /tmp/integration.stderr.log

          integration_exit=$?

          echo "===== INTEGRATION EXIT ====="
          echo "INTEGRATION_EXIT=$integration_exit"

          echo "===== INTEGRATION STDOUT ====="
          tail -n 500 /tmp/integration.stdout.log || true

          echo "===== INTEGRATION STDERR ====="
          tail -n 500 /tmp/integration.stderr.log || true

          exit 0

      - name: Build diagnostic production image
        if: always()
        shell: bash
        run: |
          set +e

          docker build \
            --tag cold-start-product-search:diagnostic \
            . \
            > /tmp/docker-build.stdout.log \
            2> /tmp/docker-build.stderr.log

          docker_build_exit=$?

          echo "===== DOCKER BUILD EXIT ====="
          echo "DOCKER_BUILD_EXIT=$docker_build_exit"

          echo "===== DOCKER BUILD STDOUT ====="
          tail -n 400 /tmp/docker-build.stdout.log || true

          echo "===== DOCKER BUILD STDERR ====="
          tail -n 400 /tmp/docker-build.stderr.log || true

          exit 0

      - name: Inspect diagnostic container startup
        if: always()
        shell: bash
        run: |
          set +e

          container_name="cold-start-product-search-diagnostic"

          docker rm -f "$container_name" > /dev/null 2>&1 || true

          docker image inspect cold-start-product-search:diagnostic > /dev/null 2>&1
          image_exit=$?

          echo "===== IMAGE CHECK ====="
          echo "IMAGE_EXIT=$image_exit"

          if [ "$image_exit" -ne 0 ]; then
            echo "Diagnostic image was not built."
            exit 0
          fi

          docker run --detach \
            --name "$container_name" \
            -p 127.0.0.1:8000:8000 \
            cold-start-product-search:diagnostic

          docker_run_exit=$?

          echo "===== CONTAINER START ====="
          echo "DOCKER_RUN_EXIT=$docker_run_exit"

          if [ "$docker_run_exit" -ne 0 ]; then
            exit 0
          fi

          for attempt in $(seq 1 30); do
            state="$(docker inspect --format '{{.State.Status}}' "$container_name" 2>/dev/null)"

            echo "attempt=$attempt state=$state"

            if [ "$state" = "running" ]; then
              if curl --fail --silent --show-error \
                http://127.0.0.1:8000/ready; then
                echo "READINESS=PASS"
                break
              fi
            fi

            if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
              break
            fi

            sleep 1
          done

          echo "===== CONTAINER STATE ====="
          docker inspect \
            --format 'status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}' \
            "$container_name" || true

          echo "===== CONTAINER LOGS ====="
          docker logs "$container_name" || true

          echo "===== CONTAINER REMOVE ====="
          docker rm -f "$container_name" || true

          exit 0