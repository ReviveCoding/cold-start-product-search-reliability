name: ci36-gate-only-popularity-credit-ablation

on:
  push:
    branches:
      - ci36-gate-only-popularity-credit-forensics
    paths:
      - ".github/workflows/ci36-gate-only-popularity-credit-ablation.yml"
      - "scripts/forensics/ci36_gate_only_popularity_credit_ablation_hosted.py"
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Canonical smoke-artifact workflow run ID
        required: false
        default: "28601964150"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  ci36_gate_only_credit_ubuntu_py311:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install package and integration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints/validated.txt -e ".[dev]"

      - name: Download and verify canonical smoke artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail
          artifact_run_id="${REQUESTED_ARTIFACT_RUN_ID:-28601964150}"

          case "$artifact_run_id" in
            (""|*[!0-9]*)
              echo "artifact run ID must be a non-empty decimal integer: $artifact_run_id" >&2
              exit 1
              ;;
          esac

          rm -rf artifacts/ci36
          mkdir -p artifacts/ci36
          gh run download "$artifact_run_id" \
            --repo "${{ github.repository }}" \
            --name canonical-smoke-artifact \
            --dir artifacts/ci36
          test -f artifacts/ci36/manifest.json

          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("artifacts/ci36/manifest.json").read_text(encoding="utf-8")
          )
          expected = "1f3e54d78060eb9d745c9480c88c22ba19d1ced2"
          actual = str(manifest.get("git_commit", ""))
          print(
              json.dumps(
                  {
                      "artifact_run_id": "${REQUESTED_ARTIFACT_RUN_ID:-28601964150}",
                      "expected_git_commit": expected,
                      "downloaded_git_commit": actual,
                  },
                  sort_keys=True,
              )
          )
          if actual != expected:
              raise SystemExit(
                  "Downloaded artifact provenance mismatch: "
                  f"expected={expected} actual={actual}"
              )
          PY

      - name: Run read-only gate-only popularity-credit ablation
        run: |
          python scripts/forensics/ci36_gate_only_popularity_credit_ablation_hosted.py \
            --repo-root . \
            --artifact-root artifacts/ci36 \
            --output-root forensics

      - name: Upload CI36 forensic evidence
        if: always() && hashFiles('forensics/**') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci36-gate-only-popularity-credit-ablation
          path: forensics
          if-no-files-found: error
          retention-days: 30
