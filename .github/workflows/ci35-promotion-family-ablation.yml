name: ci35-promotion-family-ablation

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Canonical CI run ID that owns canonical-smoke-artifact
        required: true
        default: "28601964150"

permissions:
  actions: read
  contents: read

jobs:
  ablation:
    name: ci35-family-ablation-ubuntu-py3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/validated.txt

      - name: Install validated dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints/validated.txt -e ".[dev]"
          python -m pip check

      - name: Download CI35 canonical artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf artifacts/ci35
          mkdir -p artifacts/ci35
          gh run download "${{ inputs.artifact_run_id }}" \
            --repo "${{ github.repository }}" \
            --name canonical-smoke-artifact \
            --dir artifacts/ci35
          test -f artifacts/ci35/manifest.json
          cat artifacts/ci35/manifest.json

      - name: Run read-only family-ablation screen
        run: |
          python scripts/forensics/ci35_promotion_family_ablation_hosted.py \
            --repo-root . \
            --artifact-root artifacts/ci35 \
            --output-root forensics

      - name: Upload forensic evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci35-promotion-family-ablation
          path: forensics
          if-no-files-found: warn
          retention-days: 7
