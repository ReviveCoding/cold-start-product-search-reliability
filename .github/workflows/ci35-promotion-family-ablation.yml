name: ci35-promotion-family-ablation

on:
  push:
    branches:
      - ci35-promotion-family-forensics
    paths:
      - ".github/workflows/ci35-promotion-family-ablation.yml"
      - "scripts/forensics/ci35_promotion_family_ablation_hosted.py"
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Canonical CI run ID that owns canonical-smoke-artifact
        required: true
        default: "28601964150"

permissions:
  actions: read
  contents: read

jobs:
  ablation:
    name: ci35-family-ablation-ubuntu-py3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/validated.txt

      - name: Install validated dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints/validated.txt -e ".[dev]"
          python -m pip check

      - name: Download CI35 canonical artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail
          artifact_run_id="${REQUESTED_ARTIFACT_RUN_ID:-28601964150}"

          case "$artifact_run_id" in
            (""|*[!0-9]*)
              echo "artifact run ID must be a non-empty decimal integer: $artifact_run_id" >&2
              exit 1
              ;;
          esac

          rm -rf artifacts/ci35
          mkdir -p artifacts/ci35
          gh run download "$artifact_run_id" \
            --repo "${{ github.repository }}" \
            --name canonical-smoke-artifact \
            --dir artifacts/ci35
          test -f artifacts/ci35/manifest.json

          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("artifacts/ci35/manifest.json").read_text(encoding="utf-8")
          )
          expected = "1f3e54d78060eb9d745c9480c88c22ba19d1ced2"
          actual = str(manifest.get("git_commit", ""))
          print(
              json.dumps(
                  {
                      "artifact_run_id": "28601964150",
                      "expected_git_commit": expected,
                      "downloaded_git_commit": actual,
                  },
                  sort_keys=True,
              )
          )
          if actual != expected:
              raise SystemExit(
                  "Downloaded artifact provenance mismatch: "
                  f"expected={expected} actual={actual}"
              )
          PY

      - name: Run read-only family-ablation screen
        run: |
          python scripts/forensics/ci35_promotion_family_ablation_hosted.py \
            --repo-root . \
            --artifact-root artifacts/ci35 \
            --output-root forensics

      - name: Upload forensic evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci35-promotion-family-ablation
          path: forensics
          if-no-files-found: warn
          retention-days: 7
