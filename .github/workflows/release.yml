name: release-provenance

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-attest-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/validated.txt
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os, tomllib
          from pathlib import Path
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected:
              raise SystemExit(f"release tag {os.environ['RELEASE_TAG']!r} != {expected!r}")
          PY
      - name: Install build and validation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -c constraints/validated.txt -e ".[dev]"
      - name: Validate source before release
        run: |
          python -m pip check
          python -m ruff check src tests scripts
          python scripts/run_tests.py
          python scripts/verify_build_reproducibility.py
      - name: Build release distributions
        run: python scripts/build_release.py --output-dir dist
      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt
      - name: Attest wheel and source distribution provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*
      - name: Upload distributions to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*
