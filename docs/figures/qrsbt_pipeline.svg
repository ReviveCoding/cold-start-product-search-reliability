<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Q-RSBT reliability-aware cold-start search architecture</title>
  <desc id="desc">A four-stage pipeline: temporal data integrity, retrieval and ranking, reliable substitute transfer, and release-validated serving.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EEF4F8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#61758A"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <rect x="36" y="32" width="1128" height="656" rx="22" fill="#FFFFFF" stroke="#D9E3EC"/>

  <text x="72" y="86" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#162033" text-anchor="start">Reliability-aware cold-start product search</text>
  <text x="72" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#526579" text-anchor="start">Q-RSBT turns sparse-item exposure into a bounded, evidence-gated ranking decision.</text>

  <line x1="292" y1="336" x2="340" y2="336" stroke="#61758A" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="572" y1="336" x2="620" y2="336" stroke="#61758A" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="852" y1="336" x2="900" y2="336" stroke="#61758A" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="72" y="180" width="220" height="300" rx="18" fill="#EFF6FF" stroke="#B8D4F1"/>
    <circle cx="104" cy="218" r="17" fill="#2F80ED"/>
    <text x="104" y="224" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="128" y="224" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#162033" text-anchor="start">Temporal integrity</text>
    <text x="96" y="270" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">Catalog and interaction</text>
    <text x="96" y="296" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">contracts</text>
    <text x="96" y="342" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• block-local availability</text>
    <text x="96" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• leakage checks</text>
    <text x="96" y="402" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• future holdout boundary</text>
  </g>

  <g>
    <rect x="352" y="180" width="220" height="300" rx="18" fill="#F1F8F5" stroke="#BCE2CD"/>
    <circle cx="384" cy="218" r="17" fill="#2CA36A"/>
    <text x="384" y="224" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="408" y="224" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#162033" text-anchor="start">Retrieve and rank</text>
    <text x="376" y="270" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">Semantic relevance plus</text>
    <text x="376" y="296" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">behavioral context</text>
    <text x="376" y="342" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• BM25 + dense retrieval</text>
    <text x="376" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• LambdaMART ranking</text>
    <text x="376" y="402" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• calibrated behavior</text>
  </g>

  <g>
    <rect x="632" y="180" width="220" height="300" rx="18" fill="#FFF7ED" stroke="#F5CE9D"/>
    <circle cx="664" cy="218" r="17" fill="#E58A22"/>
    <text x="664" y="224" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="688" y="224" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#162033" text-anchor="start">Q-RSBT guardrails</text>
    <text x="656" y="270" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">Reliable substitute</text>
    <text x="656" y="296" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">behavior transfer</text>
    <text x="656" y="342" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• uncertainty shrinkage</text>
    <text x="656" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• bounded promotion</text>
    <text x="656" y="402" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• risk / support gates</text>
  </g>

  <g>
    <rect x="912" y="180" width="220" height="300" rx="18" fill="#F6F1FC" stroke="#D8C3EE"/>
    <circle cx="944" cy="218" r="17" fill="#8B5CC7"/>
    <text x="944" y="224" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="968" y="224" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#162033" text-anchor="start">Validate and serve</text>
    <text x="936" y="270" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">Release decision and</text>
    <text x="936" y="296" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#526579" text-anchor="start">runtime safeguards</text>
    <text x="936" y="342" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• 29 release gates</text>
    <text x="936" y="372" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• immutable bundles</text>
    <text x="936" y="402" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#24374B" text-anchor="start">• bounded FastAPI serving</text>
  </g>

  <rect x="72" y="536" width="1060" height="104" rx="16" fill="#172235"/>
  <text x="100" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="start">Decision contract</text>
  <text x="100" y="610" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#D5E1EC" text-anchor="start">Promote only when cold-start lift, warm-item limits, irrelevant exposure, dynamic utility, calibration, OPE, latency, and artifact integrity jointly pass.</text>
</svg>
